name: TrustTrace CI

# Real end-to-end CI: Python detection tests, TS typecheck + on-device
# cascade parity tests, and a genuine Android APK build (expo prebuild ->
# gradlew assembleDebug) on a runner that has the Android SDK. This is the
# environment where "Android build succeeds" is actually verifiable --
# a Linux sandbox without the Android toolchain cannot do it.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  python-detection:
    name: Python detection + backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run full test suite (pytest)
        run: pytest tests/ -q
      - name: Reproduce optimization benchmarks
        run: python eval/benchmarks.py

  mobile-typecheck-and-parity:
    name: Mobile tsc --strict + on-device parity tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install
        run: npm install --legacy-peer-deps
      - name: TypeScript strict typecheck
        run: npm run typecheck
      - name: On-device cascade parity + invariant tests
        run: npm test

  android-build:
    name: Android APK build (real toolchain)
    runs-on: ubuntu-latest
    needs: [python-detection, mobile-typecheck-and-parity]
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      # IMPORTANT: build the COMMITTED android/ project. `expo prebuild
      # --clean` regenerates android/ from the template, which deletes the
      # committed native module (TrustTraceModelFsModule.kt), the tuned
      # AndroidManifest, and the release signing config -- producing an APK
      # that is NOT the app we ship. The committed project is the source of
      # truth; prebuild is a one-time scaffold step, not a CI step.
      - name: Debug repository layout
        run: |
          echo "===== PWD ====="
          pwd
          echo ""
          echo "===== Current directory ====="
          ls -la

          echo ""
          echo "===== Parent directory ====="
          ls -la ..

          echo ""
          echo "===== Android directory ====="
          ls -la android || true

      - name: Gradle assembleDebug (build the committed android/ project)
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

          echo ""
          echo "===== Current directory ====="
          ls -la

          echo ""
          echo "===== Parent directory ====="
          ls -la ..

          echo ""
          echo "===== Android directory ====="
          ls -la android || true
          
      - name: Gradle assembleDebug (build the committed android/ project)
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace    
          
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: trusttrace-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  # Tag-triggered release build: signed AAB for Play upload. Requires the
  # UPLOAD_* repository secrets (see README "Release" section). Runs only on
  # version tags so ordinary pushes never consume signing secrets.
  android-release:
    name: Android release AAB (signed)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [python-detection, mobile-typecheck-and-parity]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      - name: Decode upload keystore
        run: echo "${{ secrets.UPLOAD_KEYSTORE_B64 }}" | base64 -d > android/app/trusttrace-upload.keystore

      - name: Gradle bundleRelease (signed AAB)
        working-directory: mobile/android
        run: |
         chmod +x gradlew
         ./gradlew bundleRelease --no-daemon --stacktrace
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace
        env:
          TRUSTTRACE_UPLOAD_STORE_FILE: trusttrace-upload.keystore
          TRUSTTRACE_UPLOAD_STORE_PASSWORD: ${{ secrets.UPLOAD_STORE_PASSWORD }}
          TRUSTTRACE_UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          TRUSTTRACE_UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: trusttrace-release-aab
          path: mobile/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

  # iOS bring-up build: generates the ios/ project (none is committed -- iOS
  # has never been prebuilt) and compiles it for the SIMULATOR, which needs no
  # signing identity. Gated to manual dispatch + version tags: macOS minutes
  # are expensive and this job is the bring-up verifier, not a per-push gate.
  # Device/TestFlight builds additionally need an Apple Developer account and
  # signing certs -- user-side, outside CI's reach until provisioned.
  ios-build:
    name: iOS simulator build (bring-up)
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs: [mobile-typecheck-and-parity]
    runs-on: macos-14
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      - name: Expo prebuild iOS (generates ios/ + pod install)
        run: npx expo prebuild --platform ios --clean
        env:
          EXPO_NO_TELEMETRY: "1"

      - name: Build for simulator (no signing required)
        run: |
          xcodebuild -workspace ios/TrustTrace.xcworkspace \
            -scheme TrustTrace \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
